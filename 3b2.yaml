header:
  version: 8

machine: raspberrypi3-64
distro: poky
target:
  - core-image-minimal

repos:
  # 1. BitBake构建引擎（标记为禁用，不作为layer）
  bitbake:
    url: https://git.openembedded.org/bitbake
    path: layers/bitbake
    branch: master
    layers:
      bitbake: disabled

  # 2. OpenEmbedded核心层
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    path: layers/openembedded-core
    branch: master
    layers:
      meta:

  # 3. meta-yocto层（提供poky发行版配置）
  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    path: layers/meta-yocto
    branch: master
    layers:
      meta-poky:
      meta-yocto-bsp: disabled

  # 4. 树莓派硬件层（你的目标机器）
  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    path: layers/meta-raspberrypi
    branch: master

  # 可选：如果你不需要下面这些层，可以删除或注释掉
  # 但为了保持与官方结构一致，保留并禁用也未尝不可
  # meta-openembedded:
  #   url: http://git.openembedded.org/meta-openembedded
  #   path: layers/meta-openembedded
  #   branch: master
  #   layers:
  #     meta-oe:
  #     meta-python:
  #     meta-networking:
  #     meta-perl:

  # meta-qt5: 已禁用，不需要图形界面
  #   url: https://github.com/meta-qt5/meta-qt5/
  #   path: layers/meta-qt5
  #   branch: master

  # meta-yocto-bsp: 如果不需要 Yocto 参考 BSP 可禁用
  # meta-yocto:
  #   url: https://git.yoctoproject.org/meta-yocto
  #   path: layers/meta-yocto
  #   branch: master
  #   layers:
  #     meta-poky:
  #     meta-yocto-bsp: disabled

bblayers_conf_header:
  standard: |
    POKY_BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

local_conf_header:
  # 磁盘空间优化
  reduce_diskspace: |
    INHERIT += "rm_work_and_downloads"

  # 最小化构建 - 减少编译体积
  minimal-build: |
    # 禁用文档生成
    DOC_PACKAGES = ""
    
    # 禁用调试包
    INHIBIT_PACKAGE_DEBUG_SPLIT = "1"
    
    # 禁用 dev 包
    INHIBIT_PACKAGE_DEV_SPLIT = "1"
    
    # 禁用静态库
    STATICDEV_PACKAGES = ""
    
    # 减少日志
    LOG_CONFIG = "no"
    
    # 禁用多余包类型
    EXTRA_IMAGE_FEATURES ?= ""
  # 基础配置（采用官方写法）
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    SDKMACHINE = "x86_64"
    USER_CLASSES = "buildstats"
    PATCHRESOLVE = "noop"
  
  # 调试配置（无密码root登录，方便QEMU串口）
  debug-access: |
    IMAGE_FEATURES += "empty-root-password allow-empty-password allow-root-login post-install-logging"
  
  # 最小化配置 + QEMU USB网络支持
  minimal-config: |
    IMAGE_FSTYPES = "rpi-sdimg"
    ENABLE_UART = "1"
    KERNEL_MODULE_AUTOLOAD:append = " dwc2 usbnet smsc95xx"
  
  # 磁盘监控（防止空间爆满）
  diskmon: |
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"
  initramfs-config: |
    # 指定用于生成 initramfs 的镜像
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"

    # 捆绑模式：将 initramfs 嵌入内核
    INITRAMFS_IMAGE_BUNDLE = "0"

    # 非捆绑模式：单独输出 cpio.gz 文件
    # 即使 BUNDLE=1，Yocto 仍然会生成独立的 initramfs 文件
    INITRAMFS_FSTYPES = "cpio.gz"
    # 可选：为内核添加 initramfs 支持
    KERNEL_FEATURES:append = " features/initramfs/initramfs.scc"
     # 确保 initramfs 镜像也以 cpio.gz 格式输出
    IMAGE_FSTYPES:pn-core-image-minimal-initramfs = "cpio.gz"
  no-graphics: |
    # 显式移除所有图形相关特性
    DISTRO_FEATURES:remove = "x11 wayland opengl vulkan"
    DISTRO_FEATURES:remove = "pulseaudio"
    
    # 禁用 Mesa/DRM
    PACKAGECONFIG:remove:pn-mesa = "gbm egl gles1 gles2"
    PACKAGECONFIG:remove:pn-linux-libc-headers = "drm"
    
    # 禁用 Wayland
    WAYLAND_BACKEND = ""
    
    # 如果不需要蓝牙/WiFi，可取消下面注释
    # DISTRO_FEATURES:remove = "bluetooth wifi"
    # 确保 initramfs 被构建
    #IMAGE_FSTYPES += "cpio.gz"

    
