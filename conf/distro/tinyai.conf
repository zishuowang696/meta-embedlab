# TinyAI 发行版配置
# 继承自 poky，默认包含 llama-cpp（LLM 推理引擎）

require conf/distro/poky.conf

DISTRO_NAME = "TinyAI"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "tinyai"

# 默认集成 llama-cpp + Qwen2.5-0.5B 量化模型到所有镜像
DISTRO_EXTRA_RDEPENDS += "llama-cpp tinyai-model-qwen"

# 使用 OpenRC 作为 init 系统（轻量、并行启动）
INIT_MANAGER = "openrc"

# 使用 musl libc（减少体积，适合嵌入式）
TCLIBC = "musl"

# 排除不需要的 DISTRO_FEATURES（减小构建体积和依赖）
DISTRO_FEATURES_OPTED_OUT = "x11 wayland"
