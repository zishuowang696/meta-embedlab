# TinyAI 发行版配置
# 继承自 poky，默认包含 llama-cpp（LLM 推理引擎）

require conf/distro/poky.conf

DISTRO_NAME = "TinyAI"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "tinyai"

# 默认集成 llama-cpp + Qwen2.5-0.5B 量化模型到所有镜像
# dropbear：轻量 SSH 服务器（musl 兼容，~100KB）
DISTRO_EXTRA_RDEPENDS += "llama-cpp tinyai-model-qwen dropbear"

# 使用 sysvinit（poky 默认 init 系统）
# 使用 musl libc（减少体积，适合嵌入式）
TCLIBC = "musl"
