name: Build Yocto Image

on:
  push:
    branches: [ main, master ]
    paths:
      - '*.yaml'
      - 'conf/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      config:
        description: 'KAS config file to build (e.g., 3b2.yaml, raspi-tiny.yaml)'
        required: true
        default: '3b2.yaml'
        type: string

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  SCCACHE_CACHE_SIZE: 5G

jobs:
  detect-config:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.set-config.outputs.config }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine which config to build
      id: set-config
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          CONFIG="${{ github.event.inputs.config }}"
        else
          # Auto-detect based on changed yaml files in root directory
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff --name-only --cached || echo "")
          # Find first changed .yaml file in root directory
          CONFIG=$(echo "$CHANGED_FILES" | grep -E '^[^/]+\.yaml$' | head -n1)
          if [ -z "$CONFIG" ]; then
            CONFIG="3b2.yaml"  # default fallback
          fi
        fi
        echo "config=$CONFIG" >> $GITHUB_OUTPUT
        echo "Building: $CONFIG"

  build:
    needs: detect-config
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Cache Yocto sstate and downloads
      uses: actions/cache@v4
      with:
        path: |
          build/sstate-cache
          build/downloads
        key: yocto-${{ runner.os }}-${{ hashFiles(needs.detect-config.outputs.config) }}-${{ github.sha }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ hashFiles(needs.detect-config.outputs.config) }}-
          yocto-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat

    - name: Build with kas
      run: |
        kas build ${{ needs.detect-config.outputs.config }}
      env:
        SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
        SCCACHE_CACHE_SIZE: 5G

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ needs.detect-config.outputs.config }}
        path: build/tmp/deploy/images/
        retention-days: 7

    - name: Show sccache stats
      run: sccache --show-stats || true