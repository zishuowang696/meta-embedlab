name: Build 3B2 Image

on:
  push:
    branches: [ main, master ]
    paths:
      - '3b2.yaml'
      - 'conf/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
  SCCACHE_CACHE_SIZE: 5G

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Cache sccache
      uses: actions/cache@v4
      with:
        path: .cache/sccache
        key: sccache-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          sccache-${{ runner.os }}-

    - name: Cache Yocto sstate and downloads
      uses: actions/cache@v4
      with:
        path: |
          build/sstate-cache
          build/downloads
        key: yocto-${{ runner.os }}-${{ hashFiles('3b2.yaml') }}-${{ github.sha }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ hashFiles('3b2.yaml') }}-
          yocto-${{ runner.os }}-

    - name: Enable user namespaces
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        echo "kernel.apparmor_restrict_unprivileged_userns=0" | sudo tee /etc/sysctl.d/99-userns.conf

    - name: Install kas and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y kas chrpath diffstat

    - name: Build with kas
      run: |
        kas build 3b2.yaml
      env:
        SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
        SCCACHE_CACHE_SIZE: 5G

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: build/tmp/deploy/images/
        retention-days: 7

    - name: Show sccache stats
      run: sccache --show-stats || true