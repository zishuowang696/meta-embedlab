header:
  version: 8

machine: raspberrypi3-64
distro: poky-tiny
target:
  - core-image-minimal

repos:
  # 占位，保持与官方结构一致
  meta-raspberry:

  # 1. BitBake构建引擎（标记为禁用，不作为layer）
  bitbake:
    url: https://git.openembedded.org/bitbake
    path: layers/bitbake
    branch: master
    layers:
      bitbake: disabled

  # 2. OpenEmbedded核心层
  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    path: layers/openembedded-core
    branch: master
    layers:
      meta:

  # 3. meta-yocto层（提供poky/poky-tiny发行版配置）
  meta-yocto:
    url: https://git.yoctoproject.org/meta-yocto
    path: layers/meta-yocto
    branch: master
    layers:
      meta-poky:
      meta-yocto-bsp: disabled

  # 4. 树莓派硬件层（你的目标机器）
  meta-raspberrypi:
    url: https://github.com/agherzan/meta-raspberrypi.git
    path: layers/meta-raspberrypi
    branch: master

  # 可选：如果你不需要下面这些层，可以删除或注释掉
  # 但为了保持与官方结构一致，保留并禁用也未尝不可
  # meta-openembedded:
  #   url: http://git.openembedded.org/meta-openembedded
  #   path: layers/meta-openembedded
  #   branch: master
  #   layers:
  #     meta-oe:
  #     meta-python:
  #     meta-networking:
  #     meta-perl:

  # meta-qt5: 已禁用，不需要图形界面
  #   url: https://github.com/meta-qt5/meta-qt5/
  #   path: layers/meta-qt5
  #   branch: master

  # meta-yocto-bsp: 如果不需要 Yocto 参考 BSP 可禁用
  # meta-yocto:
  #   url: https://git.yoctoproject.org/meta-yocto
  #   path: layers/meta-yocto
  #   branch: master
  #   layers:
  #     meta-poky:
  #     meta-yocto-bsp: disabled

bblayers_conf_header:
  standard: |
    POKY_BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

local_conf_header:
  # 磁盘空间优化
  reduce_diskspace: |
    INHERIT += "rm_work_and_downloads"

  # poky-tiny 优化配置
  poky-tiny-optimizations: |
    # poky-tiny 已经是最小化发行版，这里添加树莓派特定优化
    # 禁用文档生成
    DOC_PACKAGES = ""

    # 禁用调试包
    INHIBIT_PACKAGE_DEBUG_SPLIT = "1"

    # 禁用 dev 包
    INHIBIT_PACKAGE_DEV_SPLIT = "1"

    # 禁用静态库
    STATICDEV_PACKAGES = ""

    # 减少日志
    LOG_CONFIG = "no"

    # poky-tiny 特定的最小化配置
    IMAGE_FEATURES = ""

  # 基础配置（采用官方写法）
  standard: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_ipk"
    SDKMACHINE = "x86_64"
    USER_CLASSES = "buildstats"
    PATCHRESOLVE = "noop"

  # 调试配置（无密码root登录）
  debug-access: |
    IMAGE_FEATURES += "empty-root-password allow-empty-password allow-root-login post-install-logging"
    # initramfs 需要单独设置（IMAGE_FEATURES 对其不生效）
    IMAGE_FEATURES:pn-core-image-minimal-initramfs = "empty-root-password allow-empty-password allow-root-login"
    ROOT_PASSWORD = ""

  # 树莓派配置 - 保持内核编译
  rpi-config: |
    IMAGE_FSTYPES = "rpi-sdimg tar.gz ext4"
    ENABLE_UART = "1"
    KERNEL_MODULE_AUTOLOAD:append = " dwc2 usbnet smsc95xx"

    # 强制使用树莓派内核（覆盖 poky-tiny 的默认设置）
    PREFERRED_PROVIDER_virtual/kernel:raspberrypi3-64 = "linux-raspberrypi"
    PREFERRED_VERSION_linux-raspberrypi = "6.6%"
    
    # 禁用 poky-tiny 的默认内核设置
    PREFERRED_PROVIDER_linux-yocto-tiny = ""
    PREFERRED_VERSION_linux-yocto-tiny = ""

    # 禁用蓝牙（通过 config.txt dtoverlay）
    DISABLE_BLUETOOTH = "1"

  # 磁盘监控（防止空间爆满）
  diskmon: |
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"

  # 可选：initramfs 配置（按需启用）
  # initramfs-config: |
  #   INITRAMFS_IMAGE = "core-image-minimal-initramfs"
  #   INITRAMFS_IMAGE_BUNDLE = "1"
  #   INITRAMFS_FSTYPES = "cpio.gz"
  #   IMAGE_FSTYPES += "cpio.gz"
  #   KERNEL_FEATURES:append = " features/initramfs/initramfs.scc"
